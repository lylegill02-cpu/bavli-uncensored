<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bavli Uncensored — Search</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #1a1510;
      --muted: #5c5348;
      --accent: #8b2500;
      --card: #fffdf8;
      --border: #d4cbb8;
      --gemara: #2d5016;
      --rashi: #1a4a6e;
      --tosafot: #6b4423;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }
    header {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 2px solid var(--ink);
      background: var(--card);
    }
    header h1 { margin: 0; font-size: 1.35rem; }
    header p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem; }
    nav { margin-top: 0.6rem; font-size: 0.9rem; }
    nav a { color: var(--accent); margin-right: 1rem; }
    main { max-width: 52rem; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
    .tabs { display: flex; gap: 0.35rem; margin-bottom: 0.75rem; }
    .tabs button {
      font: inherit;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card);
      cursor: pointer;
    }
    .tabs button.active { background: var(--ink); color: var(--card); border-color: var(--ink); }
    form { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    input[type="search"], select {
      font: inherit;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card);
    }
    input[type="search"] { flex: 1 1 16rem; font-size: 1.05rem; }
    input.hebrew { direction: rtl; font-family: "David Libre", "Noto Serif Hebrew", serif; }
    button[type="submit"] {
      font: inherit;
      padding: 0.55rem 1.1rem;
      background: var(--ink);
      color: var(--card);
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .examples { margin-bottom: 0.75rem; font-size: 0.85rem; color: var(--muted); }
    .examples button {
      font: inherit;
      font-size: 0.82rem;
      margin: 0.15rem 0.25rem 0.15rem 0;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      cursor: pointer;
    }
    .examples button:hover { border-color: var(--accent); color: var(--accent); }
    .status { color: var(--muted); font-size: 0.85rem; min-height: 1.2rem; margin-bottom: 0.5rem; }
    .hint {
      background: #ebe4d8;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.92rem;
    }
    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 1rem 0 0.5rem;
    }
    .result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.65rem;
    }
    .result.featured { border-left: 4px solid var(--accent); }
    .result h3 { margin: 0 0 0.35rem; font-size: 1rem; }
    .result .meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; }
    .result .summary { font-size: 0.92rem; margin: 0.35rem 0; }
    .result .snippet {
      margin: 0.45rem 0 0;
      font-size: 1rem;
      direction: rtl;
      font-family: "David Libre", "Noto Serif Hebrew", serif;
      text-align: right;
    }
    .result a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .actions { margin-top: 0.5rem; font-size: 0.88rem; }
    .actions a { margin-right: 1rem; }
    .ext-links { font-size: 0.82rem; color: var(--muted); }
    .ext-links a { color: var(--accent); margin-right: 0.65rem; }
    .layer {
      display: inline-block;
      font-size: 0.68rem;
      text-transform: uppercase;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: #ebe4d8;
      margin-left: 0.35rem;
    }
    .hidden { display: none; }
    #hebrew-filters.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Bavli Uncensored — Search</h1>
    <p>Type in <strong>plain English</strong> — names, topics, even full questions. Fuzzy spelling on ~60+ terms; optional AI for open-ended questions.</p>
    <nav>
      <a href="loci.html">← Loci map (guided list)</a>
    </nav>
  </header>
  <main>
    <div class="tabs">
      <button type="button" id="tab-en" class="active">English</button>
      <button type="button" id="tab-he">Hebrew</button>
    </div>
    <form id="search-form">
      <input type="search" id="q" placeholder="e.g. Jesus, Jesus was ok, gentiles, censorship…" autocomplete="off" />
      <button type="submit">Search</button>
    </form>
    <div id="hebrew-filters" class="hidden">
      <form style="margin-top:0">
        <select id="tractate"><option value="">All tractates</option></select>
        <select id="layer">
          <option value="">All layers</option>
          <option value="gemara">Gemara</option>
          <option value="rashi">Rashi</option>
          <option value="tosafot">Tosafot</option>
        </select>
      </form>
    </div>
    <div class="examples" id="examples-en">
      Try:
      <button type="button" data-q="Jesus">Jesus</button>
      <button type="button" data-q="Jesus was ok">Jesus was ok</button>
      <button type="button" data-q="Jesus trial">Jesus trial</button>
      <button type="button" data-q="gentiles censorship">gentiles censorship</button>
      <button type="button" data-q="arch angel Michael">Michael</button>
      <button type="button" data-q="Melchizadek">Melchizedek</button>
      <button type="button" data-q="cow dog kosher">cow &amp; dog</button>
      <button type="button" data-q="is it ok to eat a cow">eat a cow?</button>
    </div>
    <div class="status" id="status"></div>
    <div id="hint-box" class="hint hidden"></div>
    <div id="results"></div>
  </main>
  <script type="module">
    import { search, loadTractates, useClientMode } from "./js/app.js";
    import { searchEnglish, hasHebrew } from "./js/english-search.js";
    import { AI_EXPAND_URL } from "./js/config.js";
    import { externalLinksHtml } from "./js/external-links.js";

    const $ = (id) => document.getElementById(id);
    let mode = "en";

    if (useClientMode()) {
      const aiNote = AI_EXPAND_URL
        ? " Smart search (AI) is on."
        : " Lexicon + fuzzy spelling active; deploy workers/query-expand for full-sentence questions.";
      $("status").textContent =
        "First search downloads the text index once (~53 MB)." + aiNote;
    }

    function setMode(m) {
      mode = m;
      $("tab-en").classList.toggle("active", m === "en");
      $("tab-he").classList.toggle("active", m === "he");
      $("examples-en").classList.toggle("hidden", m === "he");
      $("hebrew-filters").classList.toggle("hidden", m === "en");
      const q = $("q");
      if (m === "en") {
        q.placeholder = "e.g. Jesus, Jesus was ok, gentiles, censorship…";
        q.classList.remove("hebrew");
      } else {
        q.placeholder = "חפש… e.g. ישו, גוים";
        q.classList.add("hebrew");
      }
    }

    $("tab-en").addEventListener("click", () => setMode("en"));
    $("tab-he").addEventListener("click", () => {
      setMode("he");
      initTractates();
    });

    async function initTractates() {
      try {
        for (const t of await loadTractates()) {
          const opt = document.createElement("option");
          opt.value = t.tractate;
          opt.textContent = t.tractate;
          $("tractate").appendChild(opt);
        }
      } catch (_) {}
    }

    function esc(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderFeatured(loc) {
      const div = document.createElement("div");
      div.className = "result featured";
      const ref = loc.ref || "pattern";
      div.innerHTML = `
        <h3>${esc(loc.topic?.en || ref)}</h3>
        <div class="meta">${esc(ref)} · ${esc(loc.tradition_status)} · ${esc(loc.layer || "")}</div>
        <div class="summary">${esc(loc.english_summary || loc.tradition_note)}</div>
        ${loc.verified?.snippet ? `<div class="snippet">${esc(loc.verified.snippet)}…</div>` : ""}
        <div class="actions">
          ${loc.ref ? `<a href="daf.html?ref=${encodeURIComponent(loc.ref)}">Read full daf →</a>` : ""}
          ${loc.ref ? externalLinksHtml(loc.ref, { compact: true }) : ""}
          <a href="loci.html">See in loci map</a>
        </div>
      `;
      return div;
    }

    function renderCorpusHit(hit) {
      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <h3><a href="daf.html?ref=${encodeURIComponent(hit.ref)}">${esc(hit.ref)}</a>
          <span class="layer">${esc(hit.layer)}</span></h3>
        <div class="snippet">${esc(hit.snippet || hit.text)}</div>
        <div class="actions">
          <a href="daf.html?ref=${encodeURIComponent(hit.ref)}">Read full daf →</a>
          ${externalLinksHtml(hit.ref, { compact: true })}
        </div>
      `;
      return div;
    }

    async function doSearch(ev) {
      ev?.preventDefault();
      const q = $("q").value.trim();
      if (!q) return;

      $("results").innerHTML = "";
      $("hint-box").classList.add("hidden");

      const useHebrew = mode === "he" || hasHebrew(q);
      if (useHebrew) setMode("he");

      $("status").textContent = "Searching…";

      try {
        if (useHebrew) {
          const results = await search(q, {
            tractate: $("tractate").value || null,
            layer: $("layer").value || null,
            limit: 30,
            onProgress: (msg) => { $("status").textContent = msg; },
          });
          $("status").textContent = results.length ? `${results.length} result(s)` : "No results";
          for (const hit of results) $("results").appendChild(renderCorpusHit(hit));
          return;
        }

        const data = await searchEnglish(q, {
          tractate: $("tractate").value || null,
          layer: $("layer").value || null,
          limit: 30,
          onProgress: (msg) => { $("status").textContent = msg; },
        });

        if (data.hint) {
          $("hint-box").textContent = data.hint;
          $("hint-box").classList.remove("hidden");
        }

        const aiTag = data.aiUsed ? " · smart search" : "";
        const lexTag = data.matchedLexicon?.length
          ? ` · matched: ${data.matchedLexicon.slice(0, 3).join(", ")}`
          : "";
        const terms = data.hebrewTerms?.length
          ? ` · Hebrew: ${data.hebrewTerms.slice(0, 4).join(", ")}`
          : "";
        $("status").textContent = total
          ? `${total} result(s)${terms}${lexTag}${aiTag}`
          : "No matches — try Michael, Jesus, cow, kosher, or deploy AI worker for full sentences";

        if (data.featured.length) {
          const h = document.createElement("div");
          h.className = "section-title";
          h.textContent = "Explained passages";
          $("results").appendChild(h);
          for (const loc of data.featured) $("results").appendChild(renderFeatured(loc));
        }

        if (data.corpus.length) {
          const h = document.createElement("div");
          h.className = "section-title";
          h.textContent = "All text matches in the Bavli";
          $("results").appendChild(h);
          for (const hit of data.corpus) $("results").appendChild(renderCorpusHit(hit));
        }
      } catch (err) {
        $("status").textContent = err.message || "Search failed";
      }
    }

    $("search-form").addEventListener("submit", doSearch);
    document.querySelectorAll(".examples button").forEach((btn) => {
      btn.addEventListener("click", () => {
        $("q").value = btn.dataset.q;
        setMode("en");
        doSearch();
      });
    });

    setMode("en");

    const params = new URLSearchParams(location.search);
    if (params.get("q")) {
      $("q").value = params.get("q");
      doSearch();
    }
    if (params.get("ref")) {
      location.replace("daf.html?ref=" + encodeURIComponent(params.get("ref")));
    }
  </script>
</body>
</html>
